<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurs — EduPlatform</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .course-layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; gap: 0; min-height: calc(100vh - var(--nav-h)); }

    /* SIDEBAR */
    .sidebar {
      background: var(--bg-1); border-right: 1px solid var(--border);
      padding: 24px 0; position: sticky; top: var(--nav-h);
      height: calc(100vh - var(--nav-h)); overflow-y: auto;
    }
    .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; }
    .overall-progress { margin-top: 14px; }
    .overall-progress .flex-between { margin-bottom: 6px; font-size: 0.8rem; }

    .section-group { margin-top: 8px; }
    .section-header {
      padding: 12px 20px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: background .15s;
    }
    .section-header:hover { background: var(--bg-2); }
    .section-num {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
      background: var(--bg-3); color: var(--text-2);
    }
    .section-num.done { background: var(--success); color: white; }
    .section-num.active { background: var(--accent); color: white; }
    .section-num.locked { background: var(--bg-3); color: var(--text-3); }
    .section-info { flex: 1; min-width: 0; }
    .section-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .section-meta { font-size: 0.75rem; color: var(--text-3); }
    .section-chevron { color: var(--text-3); transition: transform .2s; font-size: 0.75rem; }
    .section-chevron.open { transform: rotate(90deg); }

    .section-lessons { display: none; padding: 4px 0; }
    .section-lessons.open { display: block; }

    .lesson-item {
      padding: 10px 20px 10px 56px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: background .15s; position: relative;
    }
    .lesson-item:hover:not(.locked) { background: var(--bg-2); }
    .lesson-item.active { background: var(--accent-dim); }
    .lesson-item.locked { cursor: not-allowed; opacity: 0.5; }
    .lesson-status { font-size: 0.85rem; flex-shrink: 0; }
    .lesson-name { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .lesson-item.active .lesson-name { color: var(--accent-bright); font-weight: 600; }

    /* MAIN CONTENT */
    .course-main { padding: 32px; }

    /* WELCOME STATE */
    .welcome-state { text-align: center; padding: 80px 40px; }
    .welcome-icon { font-size: 5rem; margin-bottom: 24px; }

    /* SECTION HERO */
    .section-hero {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card2) 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px; margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .section-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--teal));
    }

    /* LESSONS GRID */
    .lessons-grid { display: flex; flex-direction: column; gap: 16px; }

    .lesson-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      display: flex; align-items: center; gap: 20px;
      transition: all .25s; cursor: pointer; position: relative;
    }
    .lesson-card:hover:not(.locked) {
      border-color: var(--border-bright);
      transform: translateX(4px);
      box-shadow: var(--shadow-accent);
    }
    .lesson-card.locked { opacity: 0.6; cursor: not-allowed; }
    .lesson-card.active-lesson {
      border-color: var(--accent);
      background: var(--bg-card2);
    }

    .lesson-order {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 1rem; font-weight: 800;
    }
    .lesson-order.free { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .lesson-order.unlocked { background: var(--accent-dim); color: var(--accent-bright); border: 1px solid var(--border-bright); }
    .lesson-order.locked { background: var(--bg-3); color: var(--text-3); border: 1px solid var(--border); }
    .lesson-order.done { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }

    .lesson-info { flex: 1; min-width: 0; }
    .lesson-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
    .lesson-card-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; }
    .lesson-desc { font-size: 0.85rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .lesson-stats { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .lesson-stat { text-align: center; }
    .lesson-stat-val { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; }
    .lesson-stat-lbl { font-size: 0.72rem; color: var(--text-3); }

    .lesson-action { flex-shrink: 0; }

    /* FINAL TEST CARD */
    .final-test-card {
      background: linear-gradient(135deg, rgba(37,99,235,0.08) 0%, rgba(14,165,233,0.08) 100%);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius); padding: 24px;
      display: flex; align-items: center; gap: 20px;
      margin-top: 8px;
    }
    .final-test-icon { font-size: 2.5rem; flex-shrink: 0; }
    .final-test-info { flex: 1; }
    .final-test-title { font-family: var(--font-display); font-weight: 700; margin-bottom: 4px; }

    /* ── SECTION LOCK MODAL ─────────────────────────────────── */
    .slock-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 16px;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .slock-backdrop.open { opacity: 1; pointer-events: all; }
    .slock-box {
      background: var(--bg-card); border: 1px solid var(--border-bright);
      border-radius: var(--radius); width: 100%; max-width: 520px;
      transform: translateY(20px) scale(.97); transition: transform .25s;
      overflow: hidden;
    }
    .slock-backdrop.open .slock-box { transform: none; }
    .slock-topbar {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--teal));
    }
    .slock-body { padding: 32px; text-align: center; }
    .slock-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .slock-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
    .slock-desc { color: var(--text-2); font-size: .9rem; margin-bottom: 24px; line-height: 1.6; }
    .slock-prev-info {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px; margin-bottom: 24px;
      text-align: left;
    }
    .slock-prev-label { font-size: .75rem; color: var(--text-3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    .slock-prev-name { font-weight: 700; font-size: .95rem; margin-bottom: 10px; }
    .slock-score-row { display: flex; align-items: center; gap: 12px; }
    .slock-score-bar { flex: 1; height: 8px; background: var(--bg-3); border-radius: 4px; overflow: hidden; }
    .slock-score-fill { height: 100%; border-radius: 4px; background: var(--danger); transition: width .6s ease; }
    .slock-score-fill.warn { background: var(--warning); }
    .slock-score-fill.good { background: var(--success); }
    .slock-score-pct { font-family: var(--font-display); font-size: 1rem; font-weight: 800; flex-shrink: 0; }
    .slock-need { font-size: .78rem; color: var(--text-3); margin-top: 6px; }
    .slock-actions { display: flex; gap: 10px; justify-content: center; }

    @media (max-width: 900px) {
      .course-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .lesson-stats { display: none; }
    }
    @media (max-width: 600px) {
      .course-main { padding: 16px; }
    }
  </style>
</head>
<body>
  <header class="nav" id="main-nav"></header>
  <div id="toast-container" class="toast-container"></div>

  <div class="page-wrapper">
    <div class="course-layout">
      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title" id="sb-title-uz">📚 Kurs Tarkibi</div>
          <div class="sidebar-title" id="sb-title-ru" style="display:none">📚 Структура курса</div>
          <div class="overall-progress mt-16" id="overall-progress" style="display:none">
            <div class="flex-between">
              <span class="text-sm text-muted" id="prog-lbl-uz">Umumiy progress</span>
              <span class="text-sm text-muted" id="prog-lbl-ru" style="display:none">Общий прогресс</span>
              <span class="text-sm fw-600 text-accent" id="overall-pct">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="overall-fill" style="width:0%"></div></div>
          </div>
        </div>
        <div id="sections-nav">
          <div style="padding:40px 20px; text-align:center; color:var(--text-3)">
            <div class="spinner" style="margin:0 auto 12px"></div>
            <div class="text-sm" id="load-uz">Yuklanmoqda...</div>
            <div class="text-sm" id="load-ru" style="display:none">Загрузка...</div>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="course-main" id="course-main">
        <div class="welcome-state" id="welcome-state">
          <div class="welcome-icon">👋</div>
          <h2 id="wt-uz">Kursga xush kelibsiz!</h2>
          <h2 id="wt-ru" style="display:none">Добро пожаловать на курс!</h2>
          <p class="text-muted mt-8" id="ws-uz">Chap tarafdan bo'lim tanlang</p>
          <p class="text-muted mt-8" id="ws-ru" style="display:none">Выберите раздел слева</p>
        </div>
        <div id="section-content" style="display:none"></div>
      </main>
    </div>
  </div>

  <!-- SECTION LOCK MODAL -->
  <div class="slock-backdrop" id="slock-modal">
    <div class="slock-box">
      <div class="slock-topbar"></div>
      <div class="slock-body">
        <div class="slock-icon" id="slock-icon">🔒</div>
        <div class="slock-title" id="slock-title">Bo'lim qulflangan</div>
        <div class="slock-desc" id="slock-desc"></div>
        <div class="slock-prev-info" id="slock-prev-info" style="display:none">
          <div class="slock-prev-label" id="slock-prev-label">Avvalgi bo'lim</div>
          <div class="slock-prev-name" id="slock-prev-name">—</div>
          <div class="slock-score-row">
            <div class="slock-score-bar">
              <div class="slock-score-fill" id="slock-fill" style="width:0%"></div>
            </div>
            <div class="slock-score-pct" id="slock-score-pct">—</div>
          </div>
          <div class="slock-need" id="slock-need-text"></div>
        </div>
        <div class="slock-actions">
          <button class="btn btn-primary" id="slock-go-btn" onclick="slockGoPrev()">📝 Avvalgi bo'lim testiga o'tish</button>
          <button class="btn btn-ghost" onclick="closeSectionLock()">✕ Yopish</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let courseData = null;
    let progressData = null;
    let activeSectionId = null;

    const lang = () => localStorage.getItem('lang') || 'uz';

    function t(uz, ru) { return lang() === 'ru' ? ru : uz; }

    function applyLang() {
      const isRu = lang() === 'ru';
      document.querySelectorAll('[id$="-ru"]').forEach(el => el.style.display = isRu ? '' : 'none');
      document.querySelectorAll('[id$="-uz"]').forEach(el => el.style.display = isRu ? 'none' : '');
    }

    async function loadCourse() {
      try {
        // Premium holatini serverdan yangilash
        if (Auth.isLoggedIn()) {
          await Auth.refreshPremium();
        }
        courseData = await Http.get('/api/course/overview', Auth.isLoggedIn());
        if (Auth.isLoggedIn()) {
          try { progressData = await Http.get('/api/course/my-progress'); } catch {}
        }
        renderSidebar();
        if (courseData.sections && courseData.sections.length > 0) {
          renderSection(courseData.sections[0]);
        }
      } catch(e) {
        document.getElementById('sections-nav').innerHTML =
          `<div style="padding:20px;color:var(--danger);font-size:.85rem">⚠️ ${e.message}</div>`;
      }
    }

    // ── Helpers for inter-section locking ──────────────────────
    function isSectionAccessible(idx) {
      if (idx === 0) return true;                         // 1-bo'lim — hammaga ochiq
      const prevSec = courseData.sections[idx - 1];
      const prevScore = prevSec ? (prevSec.finalTestBestScore || 0) : 0;
      return prevScore >= 80 || courseData.sections[idx].isUnlocked;
    }

    let slockPrevSectionId = null;

    function showSectionLock(secId) {
      const idx = courseData.sections.findIndex(s => s.id === secId);
      const prevSec = idx > 0 ? courseData.sections[idx - 1] : null;
      const isRu = lang() === 'ru';

      document.getElementById('slock-title').textContent = isRu ? 'Раздел заблокирован 🔒' : 'Bo\'lim qulflangan 🔒';

      if (prevSec) {
        slockPrevSectionId = prevSec.id;
        const score = prevSec.finalTestBestScore || 0;
        const scoreColor = score >= 80 ? 'good' : score >= 50 ? 'warn' : '';

        document.getElementById('slock-desc').textContent = isRu
          ? `Чтобы открыть этот раздел, наберите 80% или выше в финальном тесте предыдущего раздела.`
          : `Ushbu bo'limni ochish uchun avvalgi bo'lim yakuniy testidan 80% va undan yuqori ball yig'ing.`;

        document.getElementById('slock-prev-info').style.display = '';
        document.getElementById('slock-prev-label').textContent = isRu ? 'Предыдущий раздел' : 'Avvalgi bo\'lim';
        document.getElementById('slock-prev-name').textContent = prevSec.title;

        const fill = document.getElementById('slock-fill');
        fill.style.width = Math.min(score, 100) + '%';
        fill.className = 'slock-score-fill' + (scoreColor ? ' ' + scoreColor : '');
        document.getElementById('slock-score-pct').textContent = score + '%';
        document.getElementById('slock-score-pct').style.color = scoreColor === 'good' ? 'var(--success)' : scoreColor === 'warn' ? 'var(--warning)' : 'var(--danger)';

        const need = 80 - score;
        document.getElementById('slock-need-text').textContent = need > 0
          ? (isRu ? `Нужно ещё ${need}% · Минимум 80%` : `Yana ${need}% kerak · Kamida 80%`)
          : (isRu ? '✅ Достаточно — обновите страницу' : '✅ Yetarli — sahifani yangilang');

        document.getElementById('slock-icon').textContent = score > 0 ? '📊' : '🔒';
        document.getElementById('slock-go-btn').style.display = '';
        document.getElementById('slock-go-btn').textContent = isRu ? '📝 Перейти к тесту раздела' : '📝 Bo\'lim testiga o\'tish';
      } else {
        document.getElementById('slock-desc').textContent = isRu ? 'Раздел заблокирован.' : 'Bo\'lim qulflangan.';
        document.getElementById('slock-prev-info').style.display = 'none';
        document.getElementById('slock-go-btn').style.display = 'none';
        slockPrevSectionId = null;
      }

      document.getElementById('slock-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeSectionLock() {
      document.getElementById('slock-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function slockGoPrev() {
      if (slockPrevSectionId) {
        closeSectionLock();
        const prevSec = courseData.sections.find(s => s.id === slockPrevSectionId);
        if (prevSec) renderSection(prevSec);
        // Yakuniy test cardga scroll
        setTimeout(() => {
          const el = document.getElementById('final-test-card');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 400);
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSectionLock(); });

    // ── renderSidebar ──────────────────────────────────────────
    function renderSidebar() {
      const nav = document.getElementById('sections-nav');
      if (!courseData?.sections?.length) { nav.innerHTML = '<div style="padding:20px;color:var(--text-3);font-size:.85rem">Hali kurs qo\'shilmagan</div>'; return; }

      // Overall progress
      if (progressData) {
        document.getElementById('overall-progress').style.display = '';
        const pct = progressData.overallProgressPercent || 0;
        document.getElementById('overall-pct').textContent = pct + '%';
        document.getElementById('overall-fill').style.width = pct + '%';
      }

      nav.innerHTML = courseData.sections.map((sec, idx) => {
        const isFirstSection = idx === 0;
        const accessible = isSectionAccessible(idx);
        const allPassed = sec.passedLessons === sec.totalLessons && sec.totalLessons > 0;
        const finalDone = sec.finalTestPassed;

        let numClass = accessible ? (finalDone ? 'done' : 'active') : 'locked';
        let numContent = finalDone ? '✓' : (accessible ? (isFirstSection ? '🆓' : '🔓') : '🔒');

        return `
        <div class="section-group" data-sec-id="${sec.id}">
          <div class="section-header" onclick="${accessible ? `toggleSection(${sec.id}, this)` : `showSectionLock(${sec.id})`}">
            <div class="section-num ${numClass}">${numContent}</div>
            <div class="section-info">
              <div class="section-name">${sec.title}${isFirstSection ? ' <span style="font-size:.65rem;background:rgba(16,185,129,.15);color:var(--success);padding:1px 6px;border-radius:3px;font-weight:700">FREE</span>' : ''}</div>
              <div class="section-meta">
                ${accessible
                  ? `${sec.passedLessons}/${sec.totalLessons} ${t('dars', 'урок')}${sec.finalTestQuestions ? ` · 📝 ${sec.finalTestQuestions} savol` : ''}`
                  : `🔒 ${t('80% ball kerak', 'Нужно 80%')}`
                }
              </div>
            </div>
            <span class="section-chevron" id="chev-${sec.id}">▶</span>
          </div>
          <div class="section-lessons" id="lessons-${sec.id}">
            ${sec.lessons.map(les => `
              <div class="lesson-item ${les.isLocked ? 'locked' : ''}"
                   onclick="${les.isLocked ? '' : `openLesson(${les.id})`}"
                   id="sidebar-lesson-${les.id}">
                <span class="lesson-status">${les.isLocked ? '🔒' : les.testPassed ? '✅' : les.videoWatched ? '▶️' : les.isFree ? '🆓' : '○'}</span>
                <span class="lesson-name">${les.title}</span>
              </div>
            `).join('')}
            ${accessible ? `
            <div class="lesson-item ${!allPassed ? 'locked' : ''}"
                 onclick="${allPassed ? `openFinalTest(${sec.id})` : ''}">
              <span class="lesson-status">${finalDone ? '🏆' : allPassed ? '📝' : '🔒'}</span>
              <span class="lesson-name" style="color:${finalDone ? 'var(--success)' : allPassed ? 'var(--warning)' : 'var(--text-3)'}">
                ${t('Yakuniy test', 'Финальный тест')}
              </span>
            </div>
            ` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function toggleSection(secId, headerEl) {
      const lessons = document.getElementById(`lessons-${secId}`);
      const chev = document.getElementById(`chev-${secId}`);
      const isOpen = lessons.classList.contains('open');
      lessons.classList.toggle('open', !isOpen);
      chev.classList.toggle('open', !isOpen);

      if (!isOpen) {
        const sec = courseData.sections.find(s => s.id === secId);
        if (sec) renderSection(sec);
      }
    }

    function renderSection(sec) {
      activeSectionId = sec.id;
      document.getElementById('welcome-state').style.display = 'none';
      const main = document.getElementById('section-content');
      main.style.display = '';

      // Open sidebar section
      document.querySelectorAll('.section-lessons').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.section-chevron').forEach(el => el.classList.remove('open'));
      const sl = document.getElementById(`lessons-${sec.id}`);
      const ch = document.getElementById(`chev-${sec.id}`);
      if (sl) sl.classList.add('open');
      if (ch) ch.classList.add('open');

      const secIdx = courseData.sections.findIndex(s => s.id === sec.id);
      const accessible = isSectionAccessible(secIdx);
      const allPassed = sec.passedLessons === sec.totalLessons && sec.totalLessons > 0;

      main.innerHTML = `
        <div class="section-hero fade-in">
          <div class="flex-between flex-wrap" style="gap:12px">
            <div>
              <div class="section-label">${t('Bo\'lim', 'Раздел')} ${sec.orderIndex}</div>
              <h2 style="margin:4px 0 8px">${sec.title}</h2>
              ${sec.description ? `<p style="color:var(--text-2);font-size:.9rem">${sec.description}</p>` : ''}
            </div>
            <div style="text-align:right;flex-shrink:0">
              ${sec.finalTestPassed
                ? `<div class="badge badge-green">🏆 ${t('Yakunlandi', 'Завершено')}</div>`
                : !accessible
                ? `<div class="badge badge-gray">🔒 ${t('Qulflangan', 'Заблокировано')}</div>`
                : `<div class="badge badge-blue">▶ ${t('Davom etmoqda', 'В процессе')}</div>`}
              <div style="margin-top:10px">
                <div class="flex-between mb-8" style="font-size:.8rem;gap:12px">
                  <span class="text-muted">${t('Darslar', 'Уроки')}</span>
                  <span class="fw-600">${sec.passedLessons}/${sec.totalLessons}</span>
                </div>
                <div class="progress-bar" style="width:160px">
                  <div class="progress-fill" style="width:${sec.totalLessons ? (sec.passedLessons/sec.totalLessons*100) : 0}%"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="lessons-grid" id="lessons-grid">
          ${sec.lessons.map((les, i) => renderLessonCard(les, i)).join('')}
        </div>

        ${accessible ? `
        <div class="final-test-card mt-24 fade-in" id="final-test-card">
          <div class="final-test-icon">${sec.finalTestPassed ? '🏆' : allPassed ? '📝' : '🔒'}</div>
          <div class="final-test-info">
            <div class="final-test-title">${t('Bo\'lim yakuniy testi', 'Финальный тест раздела')}</div>
            ${sec.finalTestQuestions ? `<div style="font-size:.8rem;color:var(--accent-bright);margin-bottom:4px">📊 ${sec.finalTestQuestions} ta savol · 25 ta beriladi</div>` : ''}
            <div style="font-size:.85rem;color:var(--text-2);margin-top:4px">
              ${sec.finalTestPassed
                ? `✅ ${t('O\'tildi', 'Пройдено')} — <span style="color:var(--success)">${sec.finalTestBestScore}%</span>`
                : allPassed
                ? t('Barcha darslar o\'tildi. Yakuniy testni topshiring!', 'Все уроки пройдены. Сдайте финальный тест!')
                : t(`${sec.passedLessons}/${sec.totalLessons} dars testi o'tildi. Hammasi kerak.`, `Пройдено ${sec.passedLessons}/${sec.totalLessons} тестов уроков.`)}
            </div>
            ${sec.finalTestBestScore ? `<div class="text-sm text-muted mt-8">${t('Eng yuqori ball:', 'Лучший балл:')} <b style="color:var(--accent-bright)">${sec.finalTestBestScore}%</b></div>` : ''}
          </div>
          <div>
            ${sec.finalTestPassed
              ? `<div class="badge badge-green">✓ ${t('Topildi', 'Пройдено')}</div>`
              : allPassed
              ? `<button class="btn btn-primary" onclick="openFinalTest(${sec.id})">📝 ${t('Boshlash', 'Начать')}</button>`
              : `<button class="btn btn-secondary" disabled>🔒</button>`}
          </div>
        </div>` : ''}
      `;
    }

    function renderLessonCard(les, i) {
      const isLocked = les.isLocked;
      const orderClass = les.isFree ? 'free' : isLocked ? 'locked' : les.testPassed ? 'done' : 'unlocked';
      const orderIcon = les.testPassed ? '✓' : les.isFree ? '🆓' : isLocked ? '🔒' : (i + 1);

      return `
      <div class="lesson-card ${isLocked ? 'locked' : ''}" id="lesson-card-${les.id}"
           onclick="${isLocked ? '' : `openLesson(${les.id})`}">
        <div class="lesson-order ${orderClass}">${orderIcon}</div>
        <div class="lesson-info">
          <div class="lesson-title-row">
            <span class="lesson-card-title">${les.title}</span>
            ${les.isFree ? `<span class="badge badge-green" style="font-size:.7rem">${t('Bepul', 'Бесплатно')}</span>` : ''}
            ${les.testPassed ? `<span class="badge badge-green" style="font-size:.7rem">✅ ${t('O\'tildi', 'Пройдено')}</span>` : ''}
            ${isLocked ? `<span class="badge badge-gray" style="font-size:.7rem">🔒 ${t('Qulflangan', 'Заблокировано')}</span>` : ''}
          </div>
          ${les.description ? `<div class="lesson-desc">${les.description}</div>` : ''}
        </div>
        <div class="lesson-stats">
          ${les.durationMinutes ? `<div class="lesson-stat"><div class="lesson-stat-val">${les.durationMinutes}</div><div class="lesson-stat-lbl">${t('daqiqa', 'мин')}</div></div>` : ''}
          ${les.totalQuestions ? `<div class="lesson-stat"><div class="lesson-stat-val">${les.totalQuestions}</div><div class="lesson-stat-lbl">${t('savol', 'вопрос')}</div></div>` : ''}
          ${les.bestScore != null ? `<div class="lesson-stat"><div class="lesson-stat-val" style="color:${les.bestScore>=80?'var(--success)':'var(--warning)'}">${les.bestScore}%</div><div class="lesson-stat-lbl">${t('ball', 'балл')}</div></div>` : ''}
        </div>
        <div class="lesson-action">
          ${isLocked
            ? `<button class="btn btn-secondary btn-sm" disabled>🔒</button>`
            : `<button class="btn btn-primary btn-sm">${les.videoWatched ? '📝 Test' : '▶ ' + t('Ko\'rish', 'Смотреть')}</button>`}
        </div>
      </div>`;
    }

    function openLesson(lessonId) {
      window.location.href = `/lesson/${lessonId}`;
    }

    function openFinalTest(sectionId) {
      window.location.href = `/lesson/final-${sectionId}`;
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      applyLang();
      loadCourse();

      // Override lang switch
      const origSet = I18N.set.bind(I18N);
      I18N.set = function(l) {
        origSet(l);
        applyLang();
      };
    });
  </script>
</body>
</html>
